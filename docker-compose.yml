services:
  #Redis 
  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - discos_network

  # Qdrant Vector DB
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - discos_network

  #  MinIO Object Store
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - discos_network

  
  # Discos Discord Bot Application
  discos-bot:
    build:
      context: .
      dockerfile: DockerFile
    container_name: discos-bot
    restart: unless-stopped
    depends_on:
      - redis
      - qdrant
      - minio
    env_file:
      - .env
    volumes:
      - discos_logs:/app/logs
      - discos_state:/app/LocalState
      - sqlite_data:/app/data
    networks:
      - discos_network

networks:
  discos_network:
    driver: bridge

volumes:
  redis_data:
  qdrant_data:
  minio_data:
  sqlite_data:
  discos_logs:
  discos_state: